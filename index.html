<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>單品咖啡指南</title>
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#cfa968">
    <link rel="apple-touch-icon" href="./icon.svg">
    <link rel="stylesheet" href="style.css?v=14">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
    <nav class="topbar" style="display: flex; flex-wrap: nowrap; justify-content: space-between; align-items: center; gap: 10px;">
        <div style="display: flex; align-items: center; gap: 12px;">
            <button id="btn-toggle-sidebar" style="background: transparent; border: none; cursor: pointer; color: var(--text-main); display: flex; align-items: center; justify-content: center; padding: 4px;">
                <svg viewBox="0 0 24 24" width="26" height="26" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
            </button>
            <div class="logo">CR</div>
        </div>
        <div style="display: flex; align-items: center; gap: 10px; position: relative;">
            <button id="btn-topbar-search-icon" style="background: transparent; border: none; cursor: pointer; color: #555; display: flex; align-items: center; justify-content: center; padding: 5px;">
                <svg viewBox="0 0 24 24" width="22" height="22" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
            </button>
            <div id="topbar-search-popup" class="hidden" style="position: absolute; right: 0; top: 100%; margin-top: 8px; background: #fff; padding: 15px; border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.12); z-index: 2000; border: 1px solid #f0f0f0; width: 280px;">
                <input type="text" id="search-input" class="search-input" placeholder="Search 單品咖啡" style="width: 100%; margin: 0; box-sizing: border-box;">
            </div>
            
            <button onclick="window.location.href='map.html'" class="btn-outline" style="padding: 0.3rem 0.8rem; font-size: 0.85rem; border-radius: 20px; display: flex; align-items: center; gap: 4px; white-space: nowrap;">
                <svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
                地圖
            </button>

            <div class="auth-section" style="flex-direction: column; align-items: flex-end; gap: 8px;">
                <span id="user-display" style="white-space: nowrap;"></span>
                <div style="display: flex; gap: 8px;">
                    <button id="btn-login" class="btn-outline" style="white-space: nowrap;">會員登入</button>
                    <button id="btn-change-password" class="btn-outline hidden" style="white-space: nowrap;">更改密碼</button>
                    <button id="btn-logout" class="btn-outline hidden" style="white-space: nowrap;">登出</button>
                </div>
            </div>
        </div>
    </nav>


    <!-- 登入 Modal -->
    <div id="login-modal" class="modal hidden" style="z-index: 2010;">
        <div class="modal-content">
            <h3 style="color:var(--accent-gold); margin-top:0;">會員登入</h3>
            <div style="margin-bottom: 1.5rem;">
                <label
                    style="display:block; color:#555; margin-bottom:0.8rem; font-size:0.9rem;">Email</label>
                <input type="email" id="login-email" class="login-input" placeholder="請輸入 Email">
            </div>
            <div style="margin-bottom: 1.5rem;">
                <label
                    style="display:block; color:#555; margin-bottom:0.8rem; font-size:0.9rem;">登入密碼</label>
                <input type="password" id="login-password" class="login-input" placeholder="請輸入密碼">
            </div>
            <div style="display:flex; gap:10px; justify-content:flex-end;">
                <button id="btn-close-modal" class="btn-outline">取消</button>
                <button id="btn-submit-login" class="btn-submit">登入</button>
            </div>
            <div style="display:flex; justify-content:space-between; align-items:center; font-size:0.85rem; margin-top:15px;">
                <a href="#" id="link-forgot-password" style="color:#555; text-decoration:underline;">忘記密碼？</a>
                <a href="#" id="link-open-register" style="color:var(--accent-gold); text-decoration:none;">還不是會員？點此註冊</a>
            </div>
        </div>
    </div>

    <!-- 更改密碼 Modal -->
    <div id="password-modal" class="modal hidden" style="z-index: 2020;">
        <div class="modal-content">
            <h3 style="color:var(--accent-gold); margin-top:0;">更改密碼</h3>
            <div style="margin-bottom: 1.5rem;">
                <label style="display:block; color:#555; margin-bottom:0.8rem; font-size:0.9rem;">輸入新密碼</label>
                <input type="password" id="new-password" class="login-input" placeholder="請輸入新密碼">
            </div>
            <div style="display:flex; gap:10px; justify-content:flex-end;">
                <button id="btn-close-pwd-modal" class="btn-outline">取消</button>
                <button id="btn-submit-pwd" class="btn-submit">確認更改</button>
            </div>
        </div>
    </div>

    <!-- 註冊會員 Modal -->
    <div id="register-modal" class="modal hidden" style="z-index: 2025;">
        <div class="modal-content">
            <h3 style="color:var(--accent-gold); margin-top:0;">註冊會員</h3>
            <div style="margin-bottom: 1.5rem;">
                <label style="display:block; color:#555; margin-bottom:0.8rem; font-size:0.9rem;">姓名 (必填)</label>
                <input type="text" id="reg-name" class="login-input" placeholder="請輸入姓名">
            </div>
            <div style="margin-bottom: 1.5rem;">
                <label style="display:block; color:#555; margin-bottom:0.8rem; font-size:0.9rem;">電話 (必填)</label>
                <input type="tel" id="reg-phone" class="login-input" placeholder="請輸入電話號碼">
            </div>
            <div style="margin-bottom: 1.5rem;">
                <label style="display:block; color:#555; margin-bottom:0.8rem; font-size:0.9rem;">Email (必填)</label>
                <input type="email" id="reg-email" class="login-input" placeholder="請輸入 Email">
            </div>
            <div style="display:flex; gap:10px; justify-content:flex-end;">
                <button id="btn-close-reg-modal" class="btn-outline">取消</button>
                <button id="btn-submit-reg" class="btn-submit">註冊並發送密碼</button>
            </div>
        </div>
    </div>

    <!-- 評論 Modal -->
    <div id="reviews-modal" class="modal hidden" style="z-index: 2000;">
        <div class="modal-content"
            style="max-width: 650px; width: 95%; max-height: 90vh; overflow-y: auto; background: #fff; position: relative;">
            <button id="btn-close-reviews"
                style="position: absolute; right: 15px; top: 15px; background: transparent; border: none; color: #555; font-size: 2rem; cursor: pointer; transition: color 0.2s;">&times;</button>
            <h3
                style="color:var(--accent-gold); margin-top:0; border-left: 3px solid var(--accent-gold); padding-left: 10px;">
                客戶評論</h3>

            <div id="reviews-list" class="reviews-list" style="margin-top: 1.5rem;"></div>

            <form id="review-form" class="review-form">
                <div class="rating-inputs" style="padding: 10px; margin-bottom: 10px; gap: 5px;">
                    <div class="r-row" style="margin-bottom: 5px;">
                        <label style="width:80px;">總評(1-10)</label>
                        <input type="range" id="overall-score-in" min="1" max="10" value="8" style="flex:1;">
                        <span id="overall-val"
                            style="color:var(--accent-gold); font-size:1.1rem; font-weight:bold; width:20px; text-align:right;">8</span>
                    </div>
                    <div style="display: grid; grid-template-columns: 1fr; gap: 8px; border-top:1px dashed #eee; padding-top: 10px;">
                        <div class="r-row"><label style="width: 40px; font-size:0.85rem;">香氣</label>
                            <div class="stars" data-idx="0"></div></div>
                        <div class="r-row"><label style="width: 40px; font-size:0.85rem;">酸度</label>
                            <div class="stars" data-idx="1"></div></div>
                        <div class="r-row"><label style="width: 40px; font-size:0.85rem;">甜度</label>
                            <div class="stars" data-idx="2"></div></div>
                        <div class="r-row"><label style="width: 40px; font-size:0.85rem;">厚度</label>
                            <div class="stars" data-idx="3"></div></div>
                        <div class="r-row"><label style="width: 40px; font-size:0.85rem;">餘韻</label>
                            <div class="stars" data-idx="4"></div></div>
                    </div>
                </div>
                <textarea id="review-input" placeholder="寫下您對這支豆子的風味感受..." required style="min-height: 60px; margin-bottom: 5px; padding: 10px;"></textarea>
                <button type="submit" class="btn-submit" style="padding: 10px;">送出評論</button>
            </form>
            <div id="login-prompt"
                style="text-align:center; padding: 1.5rem; color: #555; background: #fafafa; border: 1px dashed #ccc; border-radius: 8px; margin-top: 1rem;">
                請 <a href="#" id="link-login"
                    style="color:var(--accent-gold); font-weight:bold; text-decoration:none; border-bottom:1px solid var(--accent-gold);">登入會員</a>
                以發表評分與留言
            </div>
        </div>
    </div>


    <main class="container">
        <!-- Overlay -->
        <div id="sidebar-overlay" class="sidebar-overlay"></div>

        <!-- 左側：多層次清單 (獨立側頁 Drawer) -->
        <aside class="sidebar">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px dashed var(--accent-gold); padding-bottom: 10px;">
                <h2 style="margin: 0; font-size: 1.3rem; color: var(--accent-gold); letter-spacing: 1px;">選擇各洲別</h2>
                <button id="btn-close-sidebar" style="background: transparent; border: none; font-size: 2rem; line-height: 1; color: #999; cursor: pointer; padding: 0;">&times;</button>
            </div>
            <!-- 搜尋與地圖已移至上方 topbar -->
            <div id="cafe-list" class="accordion"></div>
        </aside>

        <!-- 右側：風味雷達圖與評論 -->
        <section class="content">
            <div id="coffee-details" class="details-card imdb-card hidden">
                <button id="btn-close-details" class="mobile-close-btn">&times;</button>
                
                <!-- IMDB Hero Banner 區塊 -->
                <div class="imdb-banner">
                    <!-- 背景模糊層 -->
                    <div class="imdb-banner-bg" style="background-image: url('./coffee_poster.png');"></div>
                    <div class="imdb-banner-overlay"></div>
                    
                    <div class="imdb-banner-content">
                        <!-- 海報 -->
                        <div class="imdb-poster">
                            <img src="./coffee_poster.png" alt="Coffee Poster">
                        </div>
                        
                        <!-- 標題與評分資訊 -->
                        <div class="imdb-info">
                            <h2 id="coffee-name" class="imdb-title">請選擇一款咖啡</h2>
                            <h3 id="cafe-name-display" class="imdb-subtitle" style="display: none;"></h3>
                            
                            <div class="imdb-rating-wrap">
                                <div class="imdb-rating-col">
                                    <span class="imdb-rating-label">COFFEE RATING</span>
                                    <div style="display:flex; align-items:center;">
                                        <span class="imdb-star">★</span>
                                        <div class="imdb-score-wrap">
                                            <span id="coffee-score" class="imdb-score">--</span><span class="imdb-max">/10</span>
                                        </div>
                                    </div>
                                </div>
                                <div class="imdb-rating-col">
                                    <span class="imdb-rating-label">YOUR RATING</span>
                                    <div class="imdb-rate-action">
                                        <span class="imdb-star outline">☆</span>
                                        <span style="color:#57a3e8; font-weight:bold; cursor:pointer;" onclick="document.getElementById('btn-open-reviews').click()">Rate</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- IMDB 內文區塊 -->
                <div class="imdb-body">
                    <div class="imdb-top-split">
                        <!-- 風味筆記 -->
                        <div class="desc-box imdb-desc-box">
                            <h4 class="imdb-section-title">風味簡介</h4>
                            <p id="coffee-desc" class="desc"></p>
                        </div>

                        <!-- 推薦店家 -->
                        <div class="cafes-box desc-box imdb-desc-box">
                            <h4 class="imdb-section-title">供應門市</h4>
                            <div id="coffee-cafes-list" class="tags-container" style="display: flex; flex-wrap: wrap; gap: 8px;"></div>
                        </div>
                    </div>

                    <!-- 雷達圖 -->
                    <div class="chart-section" style="border:none; padding:0; margin-top: 1rem; background: transparent;">
                        <h4 class="imdb-section-title">風味雷達圖</h4>
                        <div class="chart-wrapper" style="height: 320px; max-width: 100%;">
                            <canvas id="radarChart"></canvas>
                        </div>
                    </div>

                    <!-- 評論按鈕 -->
                    <button id="btn-open-reviews" class="btn-outline imdb-btn-action">
                        查看完整客戶評論
                    </button>
                </div>
            </div>

            <!-- 空白狀態畫面 -->
            <div id="welcome-placeholder" class="placeholder-wrapper" style="text-align: center; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding: 1.5rem 1rem; overflow-y: auto; height: 100%; box-sizing: border-box;">

                <h2 style="color:var(--accent-gold); font-size:2.8rem; margin:0 0 10px 0; font-family: 'Noto Serif TC', serif; font-weight: 700; letter-spacing: 2px;">探索單品咖啡</h2>
                <p style="color:#666; font-size:1.1rem; max-width: 100%; line-height: 1.6; margin: 0;">請從清單選擇一款感興趣的咖啡豆，<br>查看詳細的風味雷達圖、網友評論推薦店家。</p>
                
                <!-- 首頁熱門排行榜 -->
                <div class="top5-section">
                    <h3 class="top5-title">Top 5 on Coffee Rating <span class="arrow">&gt;</span></h3>
                    <div id="top5-grid" class="top5-grid">
                        <!-- JS 動態生成 -->
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script src="script.js?v=14"></script>
</body>

</html>
