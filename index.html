<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>單品咖啡指南</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
    <nav class="topbar">
        <div class="logo">Coffee Rating</div>
        <div class="auth-section">
            <span id="user-display"></span>
            <button id="btn-login" class="btn-outline">會員登入</button>
            <button id="btn-logout" class="btn-outline hidden">登出</button>
        </div>
    </nav>
    <header class="hero">
        <div class="hero-content">
            <h1>Coffee Rating</h1>
            <p>全台最強單品咖啡風味指南，匯集各地職人烘焙的純粹風味</p>
        </div>
    </header>

    <!-- 登入 Modal -->
    <div id="login-modal" class="modal hidden" style="z-index: 1010;">
        <div class="modal-content">
            <h3 style="color:var(--accent-gold); margin-top:0;">會員登入</h3>
            <div style="margin-bottom: 1.5rem;">
                <label
                    style="display:block; color:#aaa; margin-bottom:0.8rem; font-size:0.9rem;">想以什麼身份留言？(請輸入暱稱)</label>
                <input type="text" id="login-username" class="login-input" placeholder="例如：尋豆達人">
            </div>
            <div style="display:flex; gap:10px; justify-content:flex-end;">
                <button id="btn-close-modal" class="btn-outline">取消</button>
                <button id="btn-submit-login" class="btn-submit">登入</button>
            </div>
        </div>
    </div>

    <!-- 評論 Modal -->
    <div id="reviews-modal" class="modal hidden">
        <div class="modal-content"
            style="max-width: 650px; width: 95%; max-height: 90vh; overflow-y: auto; background: #111; position: relative;">
            <button id="btn-close-reviews"
                style="position: absolute; right: 15px; top: 15px; background: transparent; border: none; color: #aaa; font-size: 2rem; cursor: pointer; transition: color 0.2s;">&times;</button>
            <h3
                style="color:var(--accent-gold); margin-top:0; border-left: 3px solid var(--accent-gold); padding-left: 10px;">
                客戶評論</h3>

            <div id="reviews-list" class="reviews-list" style="margin-top: 1.5rem;"></div>

            <form id="review-form" class="review-form">
                <div class="rating-inputs">
                    <div class="r-row" style="margin-bottom: 10px;">
                        <label style="width:100px;">總評分(1-10)</label>
                        <input type="range" id="overall-score-in" min="1" max="10" value="8" style="flex:1;">
                        <span id="overall-val"
                            style="color:var(--accent-gold); font-size:1.2rem; font-weight:bold; width:30px; text-align:right;">8</span>
                    </div>
                    <div style="border-top:1px dashed #333; margin: 10px 0;"></div>
                    <div class="r-row"><label>香氣</label>
                        <div class="stars" data-idx="0"></div>
                    </div>
                    <div class="r-row"><label>酸度</label>
                        <div class="stars" data-idx="1"></div>
                    </div>
                    <div class="r-row"><label>甜度</label>
                        <div class="stars" data-idx="2"></div>
                    </div>
                    <div class="r-row"><label>厚度</label>
                        <div class="stars" data-idx="3"></div>
                    </div>
                    <div class="r-row"><label>餘韻</label>
                        <div class="stars" data-idx="4"></div>
                    </div>
                </div>
                <textarea id="review-input" placeholder="寫下您對這支豆子的風味感受..." required></textarea>
                <button type="submit" class="btn-submit">送出評論</button>
            </form>
            <div id="login-prompt"
                style="text-align:center; padding: 1.5rem; color: #aaa; background: #151515; border: 1px dashed #444; border-radius: 8px; margin-top: 1rem;">
                請 <a href="#" id="link-login"
                    style="color:var(--accent-gold); font-weight:bold; text-decoration:none; border-bottom:1px solid var(--accent-gold);">登入會員</a>
                以發表評分與留言
            </div>
        </div>
    </div>


    <main class="container">
        <!-- 左側：多層次清單 (黑金風格) -->
        <aside class="sidebar">
            <h2 class="sidebar-title">單品咖啡搜尋</h2>
            <div class="search-box">
                <input type="text" id="search-input" class="search-input" placeholder="搜尋哪裡喝得到指定單品 (例：藝伎)">
            </div>
            <div id="cafe-list" class="accordion"></div>
        </aside>

        <!-- 右側：風味雷達圖與評論 -->
        <section class="content">
            <div id="coffee-details" class="details-card hidden">
                <button id="btn-close-details" class="mobile-close-btn">&times;</button>
                <div class="card-header">
                    <div class="title-wrap">
                        <h2 id="coffee-name">請選擇一款咖啡</h2>
                        <h3 id="cafe-name-display" class="subtitle" style="display: none;"></h3>
                    </div>
                    <div class="rating-box">
                        <div class="star">★</div>
                        <div class="score-wrap">
                            <span id="coffee-score" class="score">--</span><span class="max-score">/10</span>
                        </div>
                    </div>
                </div>

                <!-- 雷達圖移至總評分下方 -->
                <div class="chart-section"
                    style="border:none; padding:0; margin-bottom: 1rem; background: transparent;">
                    <div class="chart-wrapper" style="height: 320px;">
                        <canvas id="radarChart"></canvas>
                    </div>
                </div>

                <!-- 風味筆記 -->
                <div class="desc-box">
                    <h4 class="section-title">風味筆記</h4>
                    <p id="coffee-desc" class="desc"></p>
                </div>

                <!-- 單品店家 -->
                <div class="cafes-box desc-box" style="margin-top: 1.5rem;">
                    <h4 class="section-title" style="margin-bottom: 0.8rem;">單品店家</h4>
                    <div id="coffee-cafes-list" class="tags-container"
                        style="display: flex; flex-wrap: wrap; gap: 8px;"></div>
                </div>

                <!-- 開啟評論彈窗按鈕 -->
                <button id="btn-open-reviews" class="btn-outline"
                    style="width: 100%; border-radius: 8px; padding: 1rem; font-size: 1.1rem; border-color: var(--accent-gold); color: var(--accent-gold); margin-top: 0.5rem;">
                    查看與撰寫評論
                </button>
            </div>

            <div id="placeholder" class="placeholder-wrapper">
                <div class="carousel-container">
                    <div class="carousel-track">
                        <img src="images/coffee_card_1_1775031888638.png" alt="Coffee Card 1">
                        <img src="images/coffee_card_2_1775031907660.png" alt="Coffee Card 2">
                        <img src="images/coffee_card_3_1775031928691.png" alt="Coffee Card 3">
                        <img src="images/coffee_card_4_1775031942893.png" alt="Coffee Card 4">
                        <!-- Duplicate for seamless loop -->
                        <img src="images/coffee_card_1_1775031888638.png" alt="Coffee Card 1">
                        <img src="images/coffee_card_2_1775031907660.png" alt="Coffee Card 2">
                        <img src="images/coffee_card_3_1775031928691.png" alt="Coffee Card 3">
                        <img src="images/coffee_card_4_1775031942893.png" alt="Coffee Card 4">
                    </div>
                </div>

            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>

</html>
